name: Build and release VPK

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('test-vpk-{0}', github.run_id) || 'release-master' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vita-rust/vitasdk-rs:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(awk '
            $0 == "[package]" { in_package = 1; next }
            /^\[/ { in_package = 0 }
            in_package && /^version = / {
              gsub(/^version = "|"$/, "")
              print
              exit
            }
          ' Cargo.toml)"

          if [[ -z "$version" ]]; then
            echo "Could not read package.version from Cargo.toml" >&2
            exit 1
          fi

          echo "version=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether release exists
        if: github.event_name != 'workflow_dispatch'
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.version.outputs.version }}
        with:
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG,
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status !== 404) throw error;
              core.setOutput('exists', 'false');
            }

      - name: Build VPK
        if: github.event_name == 'workflow_dispatch' || steps.release.outputs.exists == 'false'
        env:
          RUSTFLAGS: "-C target-feature=-neon"
        run: cargo vita build vpk --release

      - name: Upload test VPK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: green-vita-test-${{ github.run_number }}
          path: target/armv7-sony-vita-newlibeabihf/release/green-vita.vpk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release build artifact
        if: github.event_name != 'workflow_dispatch' && steps.release.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: green-vita-${{ steps.version.outputs.version }}
          path: target/armv7-sony-vita-newlibeabihf/release/green-vita.vpk
          if-no-files-found: error

      - name: Create GitHub release
        if: github.event_name != 'workflow_dispatch' && steps.release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GreenVita ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: target/armv7-sony-vita-newlibeabihf/release/green-vita.vpk
