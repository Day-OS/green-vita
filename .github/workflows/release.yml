name: Build and release VPK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vita-rust/vitasdk-rs:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build VPK
        env:
          RUSTFLAGS: "-C target-feature=-neon"
        run: cargo vita build vpk --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: green-vita-vpk
          path: target/armv7-sony-vita-newlibeabihf/release/green-vita.vpk

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/armv7-sony-vita-newlibeabihf/release/green-vita.vpk
